<!DOCTYPE html>
<html>
<head>

<title>Diesel Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Diesel Entry</h2>

<form method="POST">

<label>Vehicle Number</label>
<input type="text" name="vehicle_no" class="form-control" required>

<br>

<label>Date</label>
<input type="date" name="diesel_date" class="form-control" required>

<br>

<label>Diesel (Litres)</label>
<input type="number" step="0.01" name="litres" class="form-control" required>

<br>

<label>Amount (₹)</label>
<input type="number" step="0.01" name="amount" class="form-control" required>

<br>

<label>KM Reading</label>
<input type="number" name="km" class="form-control" required>

<br>

<button class="btn btn-primary">
Save Diesel Entry
</button>

<a href="/dashboard" class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>
</html>
