<!DOCTYPE html>
<html>
<head>

<title>Vehicle Master</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Vehicle Master</h2>

<form method="POST">

<label>Vehicle No</label>
<input type="text" name="vehicle_no" class="form-control" required>

<br>

<label>Capacity (KL)</label>
<input type="text" name="capacity" class="form-control" required>

<br>

<label>RC Expiry</label>
<input type="date" name="rc_expiry" class="form-control" required>

<br>

<label>Insurance Expiry</label>
<input type="date" name="insurance_expiry" class="form-control" required>

<br>

<button class="btn btn-primary">
Save Vehicle
</button>

<a href="/dashboard" class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>
</html>
