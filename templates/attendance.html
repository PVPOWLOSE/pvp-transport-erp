<!DOCTYPE html>
<html>

<head>

<title>Driver Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Driver Attendance</h2>

<form method="POST">

<label>Driver Name</label>

<input type="text"
name="driver_name"
class="form-control"
required>

<br>

<label>Date</label>

<input type="date"
name="attendance_date"
class="form-control"
required>

<br>

<label>Status</label>

<select
name="status"
class="form-control">

<option>Present</option>

<option>Absent</option>

<option>Leave</option>

</select>

<br>

<button class="btn btn-success">

Save Attendance

</button>

<a href="/dashboard"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</body>

</html>
