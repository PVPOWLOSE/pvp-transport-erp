<!DOCTYPE html>
<html>
<head>
    <title>Edit Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Edit Attendance</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Date</label>
            <input type="date"
                   class="form-control"
                   name="date"
                   value="{{ data[2] }}"
                   required>
        </div>

        <div class="mb-3">
            <label>Driver Name</label>
            <input type="text"
                   class="form-control"
                   name="driver_name"
                   value="{{ data[1] }}"
                   required>
        </div>

        <div class="mb-3">
            <label>Status</label>
            <select class="form-control" name="status">
                <option value="Present"
                    {% if data[3]=="Present" %}selected{% endif %}>
                    Present
                </option>

                <option value="Absent"
                    {% if data[3]=="Absent" %}selected{% endif %}>
                    Absent
                </option>

                <option value="Leave"
                    {% if data[3]=="Leave" %}selected{% endif %}>
                    Leave
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Update Attendance
        </button>

        <a href="/attendance_search" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
