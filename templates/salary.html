<!DOCTYPE html>
<html>
<head>
<title>Driver Salary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Driver Salary</h2>

<form method="POST">

<input class="form-control mb-2" name="driver_name" placeholder="Driver Name" required>

<input class="form-control mb-2" name="month" placeholder="Month" required>

<input class="form-control mb-2" type="number" name="basic" placeholder="Basic Salary" required>

<input class="form-control mb-2" type="number" name="incentive" placeholder="Incentive" required>

<input class="form-control mb-2" type="number" name="advance" placeholder="Advance" required>

<button class="btn btn-primary">Save Salary</button>

</form>

<hr>

<table class="table table-bordered">

<tr>
<th>Driver</th>
<th>Month</th>
<th>Basic</th>
<th>Incentive</th>
<th>Advance</th>
<th>Net Salary</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
<td>{{ row[6] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
