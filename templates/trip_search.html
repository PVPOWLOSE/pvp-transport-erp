<!DOCTYPE html>
<html>
<head>
<title>Trip Search</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Trip Search</h2>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Vehicle No</th>
<th>Driver Name</th>
<th>Loading</th>
<th>Unloading</th>
<th>Edit</th>
<th>Delete</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>

<td>
<a href="/trip_edit/{{ row[0] }}" class="btn btn-warning btn-sm">
Edit
</a>
</td>

<td>
<a href="/trip_delete/{{ row[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this Trip?')">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard" class="btn btn-secondary">
Back
</a>

</div>

</body>
</html>
