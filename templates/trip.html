<!DOCTYPE html>
<html>

<head>

<title>Trip Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Trip Entry</h2>

<form method="POST">

<label>Vehicle No</label>
<input type="text" name="vehicle_no" class="form-control" required>

<br>

<label>Driver Name</label>
<input type="text" name="driver_name" class="form-control" required>

<br>

<label>Loading Point</label>
<input type="text" name="loading_point" class="form-control" required>

<br>

<label>Unloading Point</label>
<input type="text" name="unloading_point" class="form-control" required>

<br>

<button class="btn btn-warning">
Save Trip
</button>

<a href="/dashboard" class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>

</html>
