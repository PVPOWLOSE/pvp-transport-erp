<!DOCTYPE html>
<html>

<head>

<title>Edit Vehicle</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit Vehicle</h2>

<form method="POST">

Vehicle Number

<input
class="form-control"
name="vehicle_no"
value="{{ data[1] }}">

<br>

Capacity

<input
class="form-control"
name="capacity"
value="{{ data[2] }}">

<br>

RC Expiry

<input
type="date"
class="form-control"
name="rc_expiry"
value="{{ data[3] }}">

<br>

Insurance Expiry

<input
type="date"
class="form-control"
name="insurance_expiry"
value="{{ data[4] }}">

<br>

<button class="btn btn-success">

Update Vehicle

</button>

</form>

</div>

</body>

</html>
