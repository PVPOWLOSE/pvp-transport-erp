<!DOCTYPE html>
<html>

<head>
    <title>Edit Driver</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit Driver</h2>

<form method="POST">

    <label>Driver Name</label>

    <input type="text"
           class="form-control mb-3"
           name="driver_name"
           value="{{ data[1] }}"
           required>

    <label>Mobile</label>

    <input type="text"
           class="form-control mb-3"
           name="mobile"
           value="{{ data[2] }}"
           required>

    <label>License No</label>

    <input type="text"
           class="form-control mb-3"
           name="license"
           value="{{ data[3] }}"
           required>

    <button class="btn btn-success">
        Update Driver
    </button>

    <a href="/driver_search" class="btn btn-secondary">
        Back
    </a>

</form>

</div>

</body>

</html>
