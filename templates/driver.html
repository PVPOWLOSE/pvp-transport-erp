<!DOCTYPE html>
<html>
<head>

<title>Driver Master</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-4">

<h2>Driver Master</h2>

<form method="POST">

<label>Driver Name</label>
<input type="text"
name="driver_name"
class="form-control"
required>

<br>

<label>Mobile Number</label>
<input type="text"
name="mobile"
class="form-control"
required>

<br>

<label>License Number</label>
<input type="text"
name="license_no"
class="form-control"
required>

<br>

<button class="btn btn-success">
Save Driver
</button>

<a href="/dashboard"
class="btn btn-secondary">
Back
</a>

</form>

</div>

</body>
</html>
